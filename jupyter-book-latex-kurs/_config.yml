# Konfiguration fuer ein Jupyter Book

title: "LaTeX-Kurs: Modern und Praxisnah"
author: "Aktualisierte Kursfassung"
language: de
only_build_toc_files: true

execute:
  execute_notebooks: "off"

parse:
  myst_enable_extensions:
    - colon_fence
    - deflist
    - dollarmath
    - amsmath

html:
  use_issues_button: false
  use_repository_button: false

sphinx:
  config:
    html_static_path:
      - _static
    html_css_files:
      - custom.css
